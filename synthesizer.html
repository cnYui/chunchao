<style>
    .neon-glow-pink { box-shadow: 0 0 25px rgba(255, 0, 255, 0.8); }
    .neon-glow-cyan { box-shadow: 0 0 25px rgba(0, 251, 251, 0.8); }
    .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(209, 188, 255, 0.3); }

    /* Synth border frame styles */
    .synth-frame {
        border: 3px solid #a179ff;
        border-radius: 16px;
        box-shadow:
            0 0 40px rgba(161, 121, 255, 0.4),
            inset 0 0 30px rgba(161, 121, 255, 0.1),
            0 0 80px rgba(255, 0, 255, 0.2);
        background: linear-gradient(145deg, #1f0847 0%, #18063e 40%, #0f0326 100%);
    }

    /* Corner screws */
    .screw {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 40%, #888, #333 60%, #111);
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.8), 0 1px 2px rgba(255,255,255,0.1);
        position: relative;
        flex-shrink: 0;
    }
    .screw::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 8px;
        height: 2px;
        background: #222;
        transform: translate(-50%, -50%) rotate(45deg);
        border-radius: 1px;
    }

    /* LED indicators */
    .led {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
    }
    .led-green {
        background: radial-gradient(circle at 40% 40%, #7fff7f, #00cc00 60%, #006600);
        box-shadow: 0 0 8px rgba(0, 255, 0, 0.8);
    }
    .led-red {
        background: radial-gradient(circle at 40% 40%, #ff7f7f, #cc0000 60%, #660000);
        box-shadow: 0 0 8px rgba(255, 0, 0, 0.8);
    }
    .led-amber {
        background: radial-gradient(circle at 40% 40%, #ffcf7f, #cc8800 60%, #664400);
        box-shadow: 0 0 8px rgba(255, 136, 0, 0.8);
    }

    /* Rack ear styling */
    .rack-ear {
        background: linear-gradient(to right, #2a2a2a, #3a3a3a, #2a2a2a);
        border: 2px solid #444;
        border-radius: 4px;
    }

    /* Slider track */
    .slider-track {
        position: relative;
        cursor: pointer;
        user-select: none;
    }
    .slider-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        border-radius: 9999px;
        pointer-events: none;
    }
    .slider-thumb {
        position: absolute;
        left: 50%;
        transform: translate(-50%, 50%);
        cursor: grab;
    }
    .slider-thumb:active {
        cursor: grabbing;
    }

    /* Knob styles */
    .knob-body {
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #4a4a6a, #1a1a2a 60%, #0a0a1a);
        border: 2px solid rgba(161, 121, 255, 0.4);
        box-shadow:
            0 4px 15px rgba(0,0,0,0.6),
            inset 0 1px 2px rgba(255,255,255,0.1),
            0 0 20px rgba(161,121,255,0.3);
        cursor: grab;
        position: relative;
        user-select: none;
        transition: box-shadow 0.2s;
    }
    .knob-body:hover {
        box-shadow:
            0 4px 15px rgba(0,0,0,0.6),
            inset 0 1px 2px rgba(255,255,255,0.1),
            0 0 30px rgba(161,121,255,0.6);
    }
    .knob-body:active {
        cursor: grabbing;
    }
    .knob-indicator {
        position: absolute;
        top: 12%;
        left: 50%;
        transform: translateX(-50%);
        width: 4px;
        height: 20%;
        background: linear-gradient(to bottom, #ffabf3, #ff00ff);
        border-radius: 2px;
        box-shadow: 0 0 8px rgba(255,0,255,0.8);
    }
    .knob-ring {
        position: absolute;
        inset: -10px;
        border-radius: 50%;
        border: 1px solid rgba(161, 121, 255, 0.15);
        pointer-events: none;
    }
    .knob-direction-label {
        position: absolute;
        font-size: 8px;
        letter-spacing: 0.1em;
        font-weight: 700;
        opacity: 0.6;
        transition: opacity 0.2s, color 0.2s, text-shadow 0.2s;
        user-select: none;
    }
    .knob-direction-label.active {
        opacity: 1;
        text-shadow: 0 0 8px currentColor;
    }
    .knob-label {
        font-size: 9px;
        letter-spacing: 0.15em;
        font-weight: 700;
    }

    /* Brushed metal effect */
    .brushed-metal {
        background: repeating-linear-gradient(
            90deg,
            rgba(255,255,255,0.02) 0px,
            rgba(255,255,255,0.02) 1px,
            transparent 1px,
            transparent 3px
        ),
        linear-gradient(180deg, #2a2a3a 0%, #1a1a2a 100%);
    }

    .club-stage {
        position: relative;
        background:
            linear-gradient(90deg, rgba(1, 21, 31, 0.78) 0%, rgba(6, 5, 8, 0) 22%, rgba(6, 5, 8, 0) 68%, rgba(25, 4, 5, 0.9) 100%),
            radial-gradient(ellipse at 52% 12%, rgba(178, 36, 27, 0.48) 0%, rgba(109, 15, 16, 0.32) 34%, transparent 68%),
            linear-gradient(180deg, #070506 0%, #1a0708 44%, #050203 100%);
    }
    .club-stage::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
            repeating-linear-gradient(100deg, rgba(255,255,255,0.028) 0 1px, transparent 1px 9px),
            linear-gradient(180deg, rgba(255, 89, 55, 0.12), transparent 42%, rgba(0, 0, 0, 0.42));
        mix-blend-mode: screen;
        opacity: 0.42;
    }
    .club-stage::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(0,0,0,0.42), transparent 18%, transparent 76%, rgba(0,0,0,0.6));
    }
    .stage-console {
        border: 2px solid rgba(210, 72, 55, 0.6);
        border-radius: 10px;
        background:
            repeating-linear-gradient(95deg, rgba(255,255,255,0.026) 0 1px, transparent 1px 7px),
            linear-gradient(145deg, rgba(45, 9, 9, 0.98) 0%, rgba(14, 7, 9, 0.98) 48%, rgba(6, 6, 9, 0.98) 100%);
        box-shadow:
            0 28px 80px rgba(0, 0, 0, 0.72),
            inset 0 0 60px rgba(255, 65, 40, 0.12),
            0 0 34px rgba(210, 55, 34, 0.32);
    }
    .stage-title {
        color: rgba(255, 211, 184, 0.72);
        text-shadow: 0 0 12px rgba(255, 74, 47, 0.48);
    }
    .stage-screen {
        border: 1px solid rgba(178, 66, 48, 0.5);
        border-radius: 8px;
        box-shadow:
            inset 0 0 38px rgba(0,0,0,0.92),
            inset 0 0 18px rgba(218, 56, 36, 0.18),
            0 0 26px rgba(142, 26, 20, 0.28);
    }
    .stage-screen-base {
        background:
            linear-gradient(180deg, rgba(23, 8, 8, 0.94), rgba(3, 13, 13, 0.98)),
            radial-gradient(ellipse at 50% 100%, rgba(192, 48, 32, 0.22), transparent 62%);
    }
    .stage-screen-grid {
        background-image:
            linear-gradient(rgba(236, 82, 57, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(236, 82, 57, 0.08) 1px, transparent 1px);
        background-size: 20% 20%;
    }
    .stage-screen-label {
        color: rgba(255, 126, 83, 0.86);
        text-shadow: 0 0 10px rgba(255, 77, 45, 0.56);
    }
    .stage-panel {
        border: 1px solid rgba(194, 80, 58, 0.25);
        background:
            linear-gradient(180deg, rgba(19, 8, 9, 0.88), rgba(5, 4, 6, 0.92)),
            repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 5px);
        box-shadow:
            inset 0 1px 0 rgba(255, 196, 150, 0.08),
            inset 0 0 22px rgba(0, 0, 0, 0.5);
    }
    .stage-pad {
        position: relative;
        overflow: hidden;
        border-color: rgba(255, 185, 132, 0.22);
        background:
            linear-gradient(145deg, rgba(143, 37, 28, 0.88), rgba(46, 10, 11, 0.96) 52%, rgba(6, 8, 10, 0.98));
        box-shadow:
            inset 0 1px 0 rgba(255, 223, 178, 0.16),
            inset 0 -18px 34px rgba(0, 0, 0, 0.32),
            0 14px 26px rgba(0, 0, 0, 0.45),
            0 0 18px rgba(210, 53, 34, 0.28);
    }
    .stage-pad:nth-child(even) {
        background:
            linear-gradient(145deg, rgba(21, 66, 70, 0.92), rgba(22, 19, 18, 0.96) 56%, rgba(4, 7, 8, 0.98));
        box-shadow:
            inset 0 1px 0 rgba(210, 255, 245, 0.13),
            inset 0 -18px 34px rgba(0, 0, 0, 0.36),
            0 14px 26px rgba(0, 0, 0, 0.45),
            0 0 16px rgba(0, 124, 132, 0.2);
    }
    .stage-pad:nth-child(6) {
        border-color: rgba(255, 230, 205, 0.88);
        box-shadow:
            inset 0 1px 0 rgba(255, 236, 202, 0.22),
            inset 0 -18px 34px rgba(0, 0, 0, 0.25),
            0 14px 28px rgba(0, 0, 0, 0.46),
            0 0 28px rgba(231, 46, 33, 0.48);
    }
    .stage-pad::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
            linear-gradient(135deg, rgba(255, 218, 175, 0.16), transparent 36%),
            repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 5px);
        pointer-events: none;
    }
    .stage-pad:hover {
        filter: brightness(1.14) saturate(1.08);
        transform: translateY(-1px);
    }
    .pad-symbol {
        position: absolute;
        inset: 12%;
        width: 76%;
        height: 76%;
        object-fit: contain;
        filter: sepia(0.35) saturate(0.85) brightness(1.18) contrast(1.08) drop-shadow(0 0 10px rgba(255, 96, 58, 0.28));
        mix-blend-mode: screen;
        opacity: 0.34;
    }
    .wave-bar {
        background: #ff6848 !important;
        box-shadow: 0 0 16px rgba(255, 87, 52, 0.65);
    }
    .knob-body {
        background: radial-gradient(circle at 35% 30%, #59514f, #171313 58%, #050404);
        border-color: rgba(220, 84, 58, 0.48);
        box-shadow:
            0 6px 18px rgba(0,0,0,0.72),
            inset 0 1px 2px rgba(255,224,190,0.12),
            0 0 22px rgba(220, 60, 39, 0.24);
    }
    .knob-indicator {
        background: linear-gradient(to bottom, #ffd2ad, #ff4d32);
        box-shadow: 0 0 10px rgba(255, 73, 42, 0.8);
    }
    .knob-ring {
        border-color: rgba(204, 75, 52, 0.24);
    }
    .slider-fill-wrapper {
        background: linear-gradient(180deg, rgba(64, 46, 47, 0.92), rgba(18, 12, 13, 0.96)) !important;
    }
    .slider-fill {
        background: linear-gradient(180deg, #ff6d4c, #b82018) !important;
        box-shadow: 0 0 12px rgba(255, 82, 45, 0.58) !important;
    }
    .slider-thumb {
        background: linear-gradient(90deg, #ffb58c, #de3725) !important;
        box-shadow: 0 0 12px rgba(255, 82, 45, 0.62), 0 2px 4px rgba(0,0,0,0.62) !important;
    }
</style>
</head>
<body class="club-stage text-[#f6ded2] h-screen w-screen overflow-hidden flex items-center justify-center">

<!-- Synthesizer Frame Container -->
<div class="synth-frame stage-console relative z-10 flex flex-col p-4 gap-3" style="width: min(86vw, 1040px); height: min(88vh, 760px);">

    <!-- Top Bar: Screws + Title + LEDs -->
    <div class="flex items-center justify-between px-1 flex-shrink-0">
        <div class="flex items-center gap-2">
            <div class="screw"></div>
            <div class="led led-green"></div>
            <div class="led led-amber"></div>
        </div>
        <div class="stage-title font-label-sm tracking-[0.3em] uppercase opacity-90 text-xs">
            AIRE
        </div>
        <div class="flex items-center gap-2">
            <div class="led led-amber"></div>
            <div class="led led-red"></div>
            <div class="screw"></div>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex flex-col flex-1 gap-3 min-h-0">

        <!-- Oscilloscope Screen -->
        <div class="stage-screen relative overflow-hidden flex-shrink-0" style="height: 28%;">
            <!-- Screen background -->
            <div class="stage-screen-base absolute inset-0"></div>
            <!-- Grid lines -->
            <div class="stage-screen-grid absolute inset-0"></div>
            <!-- Waveform bars -->
            <div class="absolute bottom-0 left-0 right-0 flex items-end justify-center gap-2 px-4 h-full">
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 10%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 15%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 20%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 8%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 12%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 18%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 25%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 15%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 10%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 20%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 8%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 14%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 22%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 16%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 12%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 18%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 10%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 20%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 6%;"></div>
                <div class="wave-bar w-1 bg-secondary-container neon-glow-cyan rounded-full transition-all duration-75" style="height: 15%;"></div>
            </div>
            <!-- Screen labels -->
            <div class="stage-screen-label absolute top-2 left-3 font-label-sm tracking-widest uppercase opacity-100 text-xs">OSC-1</div>
            <div class="stage-screen-label absolute top-2 right-3 font-label-sm tracking-widest uppercase opacity-70 text-xs">MIDI 1</div>
            <!-- Scan line effect -->
            <div class="absolute inset-0 pointer-events-none" style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);"></div>
        </div>

        <!-- Bottom Section: Controls Left + Pad Grid Right -->
        <div class="flex flex-1 gap-3 min-h-0">

            <!-- Left Controls Panel -->
            <div class="w-[30%] flex flex-col gap-3 flex-shrink-0">

                <!-- Camera Monitor -->
                <div id="camera-monitor-panel" class="stage-panel rounded-lg overflow-hidden relative" style="min-height: 148px; height: 31%;">
                    <div class="stage-screen-base absolute inset-0 opacity-70"></div>
                    <div class="stage-screen-grid absolute inset-0 opacity-35"></div>
                    <div class="absolute top-2 left-3 z-10 font-label-sm tracking-widest uppercase opacity-70 text-[9px]">CAM PREVIEW</div>
                    <div class="absolute top-2 right-3 z-10 font-label-sm tracking-widest uppercase opacity-55 text-[9px]">CALIBRATE</div>
                    <div id="synth-calibration-layer" class="pointer-events-none absolute inset-0 z-20"></div>
                    <canvas id="synth-debug-canvas" class="pointer-events-none absolute inset-0 z-30"></canvas>
                    <video id="synth-camera-preview" class="hidden" playsinline muted></video>
                </div>

                <!-- Upper Section: Vibe Knob (full width) -->
                <div class="stage-panel rounded-lg p-4 flex flex-col items-center justify-center gap-2" style="min-height: 140px;">
                    <div class="font-label-sm text-on-surface-variant uppercase tracking-wider text-[9px]">VIBE</div>
                    <div id="knob-container" class="relative flex items-center justify-center" style="width: 100px; height: 100px;">
                        <div class="knob-ring"></div>
                        <div id="knob" class="knob-body" style="width: 80px; height: 80px;">
                            <div class="knob-indicator"></div>
                        </div>
                        <div id="lbl-warm" class="knob-direction-label" style="top: -5px; left: 50%; transform: translateX(-50%); color: #ffabf3;">WARM</div>
                        <div id="lbl-cold" class="knob-direction-label" style="bottom: -5px; left: 50%; transform: translateX(-50%); color: #00fbfb;">COLD</div>
                        <div id="lbl-bright" class="knob-direction-label" style="left: -27px; top: 50%; transform: translateY(-50%); color: #ffd7f5;">BRIGHT</div>
                        <div id="lbl-dark" class="knob-direction-label" style="right: -25px; top: 50%; transform: translateY(-50%); color: #d1bcff;">DARK</div>
                    </div>
                </div>

                <!-- Lower Section: 3 Vertical Sliders Side by Side -->
                <div class="stage-panel flex-1 rounded-lg p-3 flex justify-between gap-2">
                    <!-- Vol -->
                    <div class="slider-track flex flex-col items-center h-full gap-2 flex-1" data-param="volume" data-value="70">
                        <div class="font-label-sm text-on-surface-variant uppercase tracking-wider text-[9px]">VOL</div>
                        <div class="slider-fill-wrapper flex-1 w-5 bg-surface-container-highest shadow-inner rounded-full relative min-h-[60px]" style="min-width: 20px;">
                            <div class="slider-fill absolute bottom-0 w-full bg-primary shadow-[0_0_8px_rgba(255,171,243,0.8)] rounded-full" style="height: 70%;"></div>
                            <div class="slider-thumb absolute w-8 h-3 bg-primary-container rounded-sm" style="bottom: calc(70% - 6px); left: 50%; transform: translateX(-50%) translateY(-50%); box-shadow: 0 0 12px rgba(255,0,255,0.8), 0 2px 4px rgba(0,0,0,0.5);"></div>
                        </div>
                        <div class="slider-value font-label-sm text-primary text-[9px]">70</div>

                    <div class="slider-track flex flex-col items-center h-full gap-2 flex-1" data-param="reverb" data-value="40">

                        </div>
                        <div class="slider-value font-label-sm text-secondary-container text-[9px]">40</div>

                        </div>
                        <div class="slider-value font-label-sm text-tertiary text-[9px]">50</div>
                    </div>
                </div>

            </div>

                <div class="grid grid-cols-4 grid-rows-4 gap-4 w-full h-full">
                    <!-- Pads -->
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 1"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/1.png" alt=""></button>

                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 5"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/5.png" alt=""></button>

                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 8"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/8.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 9"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/9.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 10"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/10.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 11"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/11.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 12"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/12.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 13"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/13.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 14"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/14.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 15"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/15.png" alt=""></button>
                    <button class="pad-btn stage-pad rounded-lg border hover:brightness-110 active:scale-95 transition-all" aria-label="Pad 16"><img class="pad-symbol pointer-events-none select-none opacity-[0.34]" src="pic/16.png" alt=""></button>
                </div>
            </div>

        </div>
    </div>

    <!-- Bottom Bar: Screws -->
    <div class="flex items-center justify-between px-1 flex-shrink-0">
        <div class="screw"></div>
        <div class="flex items-center gap-1">
            <div class="led led-green"></div>
            <div class="led led-green"></div>
            <div class="led led-green"></div>
        </div>
        <div class="font-label-sm text-tertiary tracking-[0.2em] uppercase opacity-40 text-[10px]">v1.0</div>
        <div class="flex items-center gap-1">
            <div class="led led-green"></div>
            <div class="led led-green"></div>
            <div class="led led-green"></div>
        </div>
        <div class="screw"></div>
    </div>
</div>
